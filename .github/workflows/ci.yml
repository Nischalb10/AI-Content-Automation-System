name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v2
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pylint
    
    - name: Lint with pylint
      run: |
        pylint main.py agents.py memory.py config.py --disable=all --enable=syntax-error,undefined-variable
      continue-on-error: true
    
    - name: Check imports
      run: |
        python -c "import main; import agents; import memory; import config; print('All imports successful')"
    
    - name: Check configuration
      run: |
        python -c "from config import *; print('Configuration loaded successfully')"

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Check code style
      run: |
        pip install black flake8
        black --check . --exclude venv/ || true
        flake8 . --exclude venv/ --max-line-length=100 --ignore=E501,W503 || true

  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Run security checks
      run: |
        pip install bandit safety
        bandit -r . -ll || true
        safety check || true
